services:
  # ── FastAPI Backend (Python) ──────────────────────────────────────────────
  - type: web
    name: creatoros-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Enter in Render dashboard → Environment
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Automatically set to frontend URL for locked-down CORS in production
      - key: FRONTEND_ORIGIN
        fromService:
          name: creatoros-frontend
          type: web
          property: host

  # ── Next.js Frontend (Node.js) ─────────────────────────────────────────────
  # Single-domain deployment: all /api/* calls are proxied via Next.js rewrites
  # to the backend service URL. No cross-origin requests from the browser.
  - type: web
    name: creatoros-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Server-side only: used by next.config.ts resolveBackendUrl() at build/runtime.
      # "host" is a valid Render Blueprint property and returns just the hostname
      # (e.g. creatoros-backend.onrender.com). resolveBackendUrl() prepends https://.
      - key: BACKEND_INTERNAL_URL
        fromService:
          name: creatoros-backend
          type: web
          property: host
      # Browser-side Supabase client credentials
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
